# /etc/nginx/sites-available/babsim.conf

# 1. HTTP (80) -> HTTPS (443) 리디렉션 서버
server {
    listen 80;
    server_name your_domain.com; # TODO: 실제 도메인으로 변경

    # Let's Encrypt 갱신을 위한 경로
    location / /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS (443) 리버스 프록시 서버
server {
    listen 443 ssl;
    server_name your_domain.com; # TODO: 실제 도메인으로 변경

    # SSL/TLS 인증서 경로 (환경에 맞게 수정)
    ssl_certificate /etc/letsencrypt/live/your_domain.com/fullchain.pem; # TODO: SSL 인증서 경로
    ssl_certificate_key /etc/letsencrypt/live/your_domain.com/privkey.pem; # TODO: SSL 개인키 경로

    # SSL 프로토콜 및 암호화 스위트 설정 (보안 강화)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        # 백엔드 Spring Boot 애플리케이션으로 요청 전달
        proxy_pass http://localhost:8080;

        # 클라이언트의 실제 IP, 프로토콜 등 헤더 정보 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
