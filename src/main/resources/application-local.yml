# ==================================================
# =      Spring Profile for Local Development      =
# = (Activated by default in application.yml)    =
# ==================================================

spring:
  # ===============================
  # =       Database (MySQL)      =
  # ===============================
  datasource:
    mysql:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
    timescaledb:
      driver-class-name: org.postgresql.Driver
      url: ${TIMESCALEDB_URL}
      username: ${TIMESCALEDB_USER}
      password: ${TIMESCALEDB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect # MySQL 방언 설정
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

  # ===============================
  # =      Redis (Enabled)        =
  # ===============================
  data:
    redis:
      enabled: true
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  cache:
    type: redis
