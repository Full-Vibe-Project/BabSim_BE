spring:
  application:
    name: babsim-backend
  # ===============================
  # =  Default Profile Activation   =
  # ===============================
  profiles:
    # 기본적으로 local 프로필을 활성화합니다.
    # 다른 환경에서 실행하려면 --spring.profiles.active=dev 와 같이 명시적으로 프로필을 지정해야 합니다.
    active: local

# ===============================
# =      Swagger (OpenAPI)      =
# ===============================
springdoc:
  version: v1.0.0
  title: '밥심(BabSim) API'
  description: 'AI 기반 헬스케어 식단 관리 서비스 API 명세서'
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

# ===============================
# =   Monitoring (Prometheus)   =
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
