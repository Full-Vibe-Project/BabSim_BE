spring:
  application:
    name: babsim-backend

  # ===============================
  # =  Database (Default: H2)     =
  # ===============================
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb # 로컬에서는 H2 인메모리 DB 사용
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  # ===============================
  # =   Redis (Default: Disabled) =
  # ===============================
  data:
    redis:
      # 기본적으로 Redis 비활성화. dev, prod 프로필에서 활성화.
      enabled: false
  cache:
    # 로컬에서는 simple cache 사용
    type: simple

# ===============================
# =      Swagger (OpenAPI)      =
# ===============================
springdoc:
  version: v1.0.0
  title: '밥심(BabSim) API'
  description: 'AI 기반 헬스케어 식단 관리 서비스 API 명세서'
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

# ===============================
# =   Monitoring (Prometheus)   =
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
